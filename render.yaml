services:
  - type: web
    name: my-portfolio
    env: python
    plan: free # <--- Explicitly set to free
    buildCommand: "./build.sh"
    startCommand: "gunicorn my_portfolio.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: portfolio-db
    plan: free # <--- Explicitly set to free
    region: ohio 
